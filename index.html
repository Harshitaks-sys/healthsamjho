<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthSamjho</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f9fafb;
}

.hs-app {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.screen {
  display: none;
}

.screen.on {
  display: block;
}

button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button.secondary {
  background: #e5e7eb;
  color: black;
}

textarea {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
}

.result {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  font-size: 14px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="hs-app">

<!-- HOME -->
<div id="home" class="screen on">
  <h2>HealthSamjho</h2>
  <p>Your health, explained simply</p>

  <button onclick="show('prescription')">💊 Prescription Decoder</button>
  <button onclick="show('report')">🧪 Test Report Explainer</button>
  <button onclick="show('conversation')">🎙️ Doctor Conversation</button>
</div>

<!-- PRESCRIPTION -->
<div id="prescription" class="screen">
  <button class="secondary" onclick="show('home')">← Back</button>

  <h3>Upload Prescription</h3>
  <input type="file" id="pfile" accept="image/*">

  <button onclick="analyzePrescription()">Analyze Prescription</button>

  <div id="ploading" style="display:none;">Analyzing...</div>
  <div id="presult" class="result"></div>
</div>

<!-- REPORT -->
<div id="report" class="screen">
  <button class="secondary" onclick="show('home')">← Back</button>

  <h3>Upload Report</h3>
  <input type="file" id="rfile" accept="image/*">

  <button onclick="analyzeReport()">Analyze Report</button>

  <div id="rloading" style="display:none;">Analyzing...</div>
  <div id="rresult" class="result"></div>
</div>

<!-- CONVERSATION -->
<div id="conversation" class="screen">
  <button class="secondary" onclick="show('home')">← Back</button>

  <h3>Doctor Conversation</h3>
  <textarea id="transcript" rows="6" placeholder="Type what doctor said..."></textarea>

  <button onclick="analyzeConversation()">Summarize</button>

  <div id="cresult" class="result"></div>
</div>

</div>

<script>

/* ================= CONFIG ================= */
const GEMINI_API_KEY = "AIzaSyBJ9jb3Jq7350iTESmuTlohyNDN6V2te4M";

/* ================= NAVIGATION ================= */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('on');
  });

  const el = document.getElementById(id);
  if(el) el.classList.add('on');
}

/* ================= PRESCRIPTION ================= */
async function analyzePrescription(){

  const file = document.getElementById('pfile').files[0];
  if(!file){
    alert("Upload image first");
    return;
  }

  document.getElementById('ploading').style.display = 'block';

  try {

    const base64 = await toBase64(file);

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          contents:[{
            parts:[
              { text:"Explain this prescription simply. Return JSON." },
              {
                inline_data:{
                  mime_type:"image/jpeg",
                  data:base64.split(',')[1]
                }
              }
            ]
          }]
        })
      }
    );

    const data = await safeParse(res);

    document.getElementById('presult').innerText = JSON.stringify(data, null, 2);

  } catch(err){
    alert("Error analyzing prescription");
    console.error(err);
  }

  document.getElementById('ploading').style.display = 'none';
}

/* ================= REPORT ================= */
async function analyzeReport(){

  const file = document.getElementById('rfile').files[0];
  if(!file){
    alert("Upload image first");
    return;
  }

  document.getElementById('rloading').style.display = 'block';

  try {

    const base64 = await toBase64(file);

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          contents:[{
            parts:[
              { text:"Explain this medical report simply. Return JSON." },
              {
                inline_data:{
                  mime_type:"image/jpeg",
                  data:base64.split(',')[1]
                }
              }
            ]
          }]
        })
      }
    );

    const data = await safeParse(res);

    document.getElementById('rresult').innerText = JSON.stringify(data, null, 2);

  } catch(err){
    alert("Error analyzing report");
    console.error(err);
  }

  document.getElementById('rloading').style.display = 'none';
}

/* ================= CONVERSATION ================= */
async function analyzeConversation(){

  const text = document.getElementById('transcript').value.trim();

  if(!text){
    alert("Enter conversation");
    return;
  }

  try {

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          contents:[{
            parts:[
              { text:`Summarize this doctor conversation simply: ${text}` }
            ]
          }]
        })
      }
    );

    const data = await safeParse(res);

    document.getElementById('cresult').innerText = JSON.stringify(data, null, 2);

  } catch(err){
    alert("Error analyzing conversation");
  }
}

/* ================= HELPERS ================= */
function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function safeParse(res){
  const out = await res.json();

  if(!out.candidates){
    throw new Error("No API response");
  }

  const text = out.candidates[0].content.parts[0].text;

  try{
    return JSON.parse(text.replace(/```json|```/g,''));
  }catch{
    return { raw:text };
  }
}

</script>

</body>
</html>
