<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HealthSamjho</title>

<style>
/* --- SAME CSS (UNCHANGED) --- */
:root{
 --color-background-primary:#ffffff;
 --color-background-secondary:#f8fafc;
 --color-text-primary:#111827;
 --color-text-secondary:#6b7280;
 --color-border-secondary:#d1d5db;
 --color-border-tertiary:#e5e7eb;
 --border-radius-lg:24px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',system-ui,sans-serif}
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

.hs-app{max-width:420px;margin:0 auto;min-height:600px;background:#fff;border-radius:24px;overflow:hidden}
.screen{display:none}
.screen.on{display:block}

/* keep your existing UI styles */
</style>
</head>

<body>

<div class="hs-app">

<!-- HOME -->
<div id="home" class="screen on">
  <div style="padding:30px;text-align:center">
    <h1>HealthSamjho</h1>
    <p>Your health, explained simply</p>

    <br>

    <button onclick="show('prescription')">Prescription</button>
    <button onclick="show('report')">Report</button>
    <button onclick="show('conversation')">Conversation</button>
  </div>
</div>

<!-- PRESCRIPTION -->
<div id="prescription" class="screen">
  <button onclick="show('home')">← Back</button>

  <input type="file" id="pfile" accept="image/*" onchange="handlePrescFile(event)">
  <br><br>

  <button onclick="analyzePrescription()">Analyze</button>

  <div id="ploading" style="display:none">Loading...</div>
  <div id="presult"></div>
</div>

<!-- REPORT -->
<div id="report" class="screen">
  <button onclick="show('home')">← Back</button>

  <input type="file" id="rfile" accept="image/*" onchange="handleReportFile(event)">
  <br><br>

  <button onclick="analyzeReport()">Analyze</button>

  <div id="rloading" style="display:none">Loading...</div>
  <div id="rresult"></div>
</div>

<!-- CONVERSATION -->
<div id="conversation" class="screen">
  <button onclick="show('home')">← Back</button>

  <textarea id="transcript" placeholder="Type doctor conversation..."></textarea>
  <br><br>

  <button onclick="analyzeConversation()">Analyze</button>

  <div id="cresult"></div>
</div>

</div>

<script>

/* ================= CONFIG ================= */
const GEMINI_API_KEY = "AIzaSyBJ9jb3Jq7350iTESmuTlohyNDN6V2te4M";

/* ================= NAV ================= */
function show(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
 document.getElementById(id).classList.add('on');
}

/* ================= PRESCRIPTION ================= */
let prescImgB64 = null;

function handlePrescFile(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = () => prescImgB64 = reader.result;
  reader.readAsDataURL(file);
}

async function analyzePrescription(){

  if(!prescImgB64){
    alert("Upload image first");
    return;
  }

  document.getElementById('ploading').style.display = 'block';

  try {

    const base64 = prescImgB64.split(',')[1];

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          contents:[{
            parts:[
              { text: getPrescPrompt() },
              {
                inline_data:{
                  mime_type:"image/jpeg",
                  data:base64
                }
              }
            ]
          }]
        })
      }
    );

    const out = await res.json();

    if(!out.candidates){
      throw new Error("No response");
    }

    const text = out.candidates[0].content.parts[0].text;
    const clean = text.replace(/```json|```/g,'');

    const data = JSON.parse(clean);

    document.getElementById('presult').innerHTML = JSON.stringify(data, null, 2);

  } catch(err){
    console.error(err);
    alert("Failed to analyze prescription");
  }

  document.getElementById('ploading').style.display = 'none';
}

function getPrescPrompt(){
  return `Explain medicines simply. Return JSON only.`;
}

/* ================= REPORT ================= */
let reportImgB64 = null;

function handleReportFile(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = () => reportImgB64 = reader.result;
  reader.readAsDataURL(file);
}

async function analyzeReport(){

  if(!reportImgB64){
    alert("Upload image first");
    return;
  }

  document.getElementById('rloading').style.display = 'block';

  try {

    const base64 = reportImgB64.split(',')[1];

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          contents:[{
            parts:[
              { text: getReportPrompt() },
              {
                inline_data:{
                  mime_type:"image/jpeg",
                  data:base64
                }
              }
            ]
          }]
        })
      }
    );

    const out = await res.json();

    if(!out.candidates){
      throw new Error("No response");
    }

    const text = out.candidates[0].content.parts[0].text;
    const clean = text.replace(/```json|```/g,'');

    const data = JSON.parse(clean);

    document.getElementById('rresult').innerHTML = JSON.stringify(data, null, 2);

  } catch(err){
    console.error(err);
    alert("Failed to analyze report");
  }

  document.getElementById('rloading').style.display = 'none';
}

function getReportPrompt(){
  return `Explain report simply. Return JSON only.`;
}

/* ================= CONVERSATION ================= */
function analyzeConversation(){
  const text = document.getElementById('transcript').value;

  if(!text){
    alert("Enter text");
    return;
  }

  document.getElementById('cresult').innerHTML = "Summary generated (mock)";
}

</script>

</body>
</html>
