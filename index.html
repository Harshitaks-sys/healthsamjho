function show(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
 document.getElementById(id).classList.add('on');
 window.scrollTo(0,0);

// ---- PRESCRIPTION ----
function handlePrescFile(e){
  const file = e.target.files[0]; if(!file) return;
  window.prescMime = file.type;
  const reader = new FileReader();
  reader.onload = function(){
    prescImgB64 = reader.result;
    document.getElementById('pimg').src = prescImgB64;
    document.getElementById('pimg-wrap').style.display = 'block';
    document.getElementById('pzone').style.display = 'none';
    document.getElementById('panalyze-btn').style.display = 'flex';
    document.getElementById('presult').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function analyzePrescription(){

  if(!prescImgB64){
    alert("Please upload a prescription first.");
    return;
  }

  document.getElementById('panalyze-btn').style.display = 'none';
  document.getElementById('pimg-wrap').style.display = 'none';
  document.getElementById('ploading').style.display = 'block';
  document.getElementById('presult').style.display = 'none';

  try {

    const base64 = prescImgB64.split(',')[1];

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: getPrescPrompt() },
              {
                inline_data: {
                  mime_type: window.prescMime || "image/jpeg",
                  data: base64
                }
              }
            ]
          }]
        })
      }
    );

    const out = await res.json();

    if (!out.candidates || !out.candidates[0]) {
      throw new Error("No response from API");
    }

    const txt = out.candidates[0].content.parts[0].text.trim();
    const clean = txt.replace(/```json|```/g,'').trim();

    const data = JSON.parse(clean);

    document.getElementById('ploading').style.display = 'none';

    const el = document.getElementById('presult');
    el.style.display = 'block';
    el.innerHTML = renderPrescription(data);

  } catch(err) {
    console.error(err);
    document.getElementById('ploading').style.display = 'none';
    alert("Error reading prescription. Try again.");
  }
}
